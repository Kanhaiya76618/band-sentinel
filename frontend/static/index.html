<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aegis — Multi-Agent Platform</title>
<style>
  :root {
    --bg: #0a0e17;
    --panel: #111726;
    --panel-2: #0d1320;
    --line: #1f2a3d;
    --txt: #e6edf6;
    --muted: #8092ad;
    --accent-brand: #6ea8fe;
    --observer: #22d3ee;
    --diagnostician: #60a5fa;
    --remediator: #fbbf24;
    --validator: #f87171;
    --commander: #4ade80;
    --pass: #34d399;
    --reject: #fb5d5d;
    --warn: #fcd34d;
    --sidebar-w: 232px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.5 ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    background: radial-gradient(1200px 600px at 70% -10%, #15203a 0%, var(--bg) 55%);
    color: var(--txt);
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }

  /* ── App shell ───────────────────────────────────────────────────── */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: var(--sidebar-w); flex: 0 0 var(--sidebar-w);
    border-right: 1px solid var(--line); background: rgba(13,19,32,.6);
    padding: 18px 14px; position: sticky; top: 0; height: 100vh;
    display: flex; flex-direction: column; gap: 6px;
  }
  .sidebar .brand h1 { margin: 0; font-size: 16px; letter-spacing: 2px; }
  .sidebar .brand .sub { color: var(--muted); font-size: 11px; letter-spacing: 1px; margin-bottom: 14px; }
  .nav { display: flex; flex-direction: column; gap: 3px; }
  .nav a {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: 9px; color: var(--muted); border: 1px solid transparent;
    letter-spacing: .5px; transition: background .15s, color .15s, border-color .15s;
  }
  .nav a:hover { color: var(--txt); background: var(--panel-2); }
  .nav a.active { color: var(--txt); background: var(--panel); border-color: var(--line); }
  .nav a .ic { width: 18px; text-align: center; opacity: .9; }
  .nav a .badge-soon { margin-left: auto; font-size: 9px; letter-spacing: 1px; color: #5b6b86; border: 1px solid var(--line); border-radius: 5px; padding: 0 5px; }
  .sidebar .foot { margin-top: auto; font-size: 11px; color: var(--muted); border-top: 1px solid var(--line); padding-top: 12px; }
  .sidebar .foot .mode { color: var(--commander); }

  .main { flex: 1; min-width: 0; padding: 22px 26px 80px; max-width: 1100px; }
  .section-head { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .section-head h2 { margin: 0; font-size: 19px; letter-spacing: 1.5px; }
  .section-head .desc { color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }

  /* ── Buttons / inputs ────────────────────────────────────────────── */
  select, button, input, textarea {
    font: inherit; color: var(--txt); background: var(--panel);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px;
  }
  button { cursor: pointer; }
  button.run, button.primary {
    background: linear-gradient(180deg, #1d3a5f, #14283f);
    border-color: #2c4a73; font-weight: 600; letter-spacing: .5px;
  }
  button.run:disabled, button.primary:disabled { opacity: .5; cursor: default; }
  button.ghost { background: var(--panel-2); }
  .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3a4b66; }
  .dot.live { background: var(--pass); box-shadow: 0 0 0 0 rgba(52,211,153,.6); animation: pulse 1.3s infinite; }
  .dot.ok { background: var(--pass); }
  .dot.bad { background: var(--warn); }
  @keyframes pulse { 70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); } 100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); } }

  /* ── Dashboard ───────────────────────────────────────────────────── */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 22px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .stat .k { font-size: 11px; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
  .stat .v { font-size: 26px; margin-top: 6px; font-weight: 700; }
  .stat .v.good { color: var(--pass); }
  .stat .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat.accent { border-color: #2c4a73; background: linear-gradient(180deg, #12233b, var(--panel)); }

  .two-col { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
  @media (max-width: 880px) { .two-col { grid-template-columns: 1fr; } }
  .block { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .block h3 { margin: 0 0 12px; font-size: 13px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }

  .activity { display: flex; flex-direction: column; gap: 8px; }
  .act { display: flex; gap: 11px; align-items: flex-start; padding: 9px 10px; border-radius: 9px; background: var(--panel-2); border: 1px solid var(--line); }
  .act .ic { font-size: 16px; line-height: 1.3; }
  .act .body { min-width: 0; flex: 1; }
  .act .t { font-weight: 600; }
  .act .s { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
  .act .when { color: #5b6b86; font-size: 11px; margin-left: auto; white-space: nowrap; }
  .act .chip { font-size: 10px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .act .chip.resolved, .act .chip.submitted { color: var(--pass); border-color: #234a39; }
  .act .chip.escalated { color: var(--reject); border-color: #5a2a2a; }

  .services { display: flex; flex-direction: column; gap: 8px; }
  .svc { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 9px; background: var(--panel-2); border: 1px solid var(--line); }
  .svc .label { font-weight: 600; }
  .svc .detail { color: var(--muted); font-size: 11.5px; margin-left: auto; text-align: right; }

  .quick { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
  .quick button { padding: 12px 18px; }

  .empty { color: var(--muted); text-align: center; padding: 40px 0; border: 1px dashed var(--line); border-radius: 12px; }
  .placeholder { color: var(--muted); }
  .placeholder ul { margin: 10px 0 0; padding-left: 18px; }
  .placeholder li { margin: 4px 0; }

  /* ── Resolve controls (Phase 2) ──────────────────────────────────── */
  .muted { color: var(--muted); }
  .note { font-size: 12px; margin: 0 0 12px; }
  .resolve-modes { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tab { background: var(--panel-2); color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 7px 13px; }
  .tab.on { color: var(--txt); background: var(--panel); border-color: #2c4a73; }
  .resolve-input { margin-bottom: 6px; }
  .resolve-input textarea { width: 100%; resize: vertical; background: var(--panel-2); }
  .resolve-input .fields { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .resolve-input .fields label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted); letter-spacing: .5px; }
  .resolve-input .fields input { min-width: 180px; }
  .filebtn { display: inline-block; cursor: pointer; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; }
  .filebtn input { display: none; }

  .approval { margin-top: 6px; border: 1px solid #5a4a1f; background: rgba(252,211,77,.06); border-radius: 12px; padding: 14px 16px; animation: slidein .3s ease both; }
  .approval .ahead { color: var(--warn); font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; }
  .approval .abtns { display: flex; gap: 10px; margin-top: 12px; }

  .emailbar { margin-top: 12px; padding: 11px 15px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel); color: var(--muted); font-size: 13px; }
  .emailbar.pass { border-color: #234a39; color: var(--pass); }
  .emailbar.warn { border-color: #5a4a1f; color: var(--warn); }

  /* ── Jobs (Phase 3) ──────────────────────────────────────────────── */
  .matches { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .match { background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px; }
  .match .mtop { display: flex; align-items: baseline; gap: 10px; }
  .match .mtitle { font-weight: 600; }
  .match .fit { margin-left: auto; font-weight: 700; font-size: 12px; white-space: nowrap; }
  .match .reasons { font-size: 11.5px; margin-top: 3px; }
  .dlrow { margin-top: 8px; display: flex; gap: 8px; }
  .dlbtn { display: inline-block; font-size: 11px; padding: 4px 10px; border: 1px solid #2c4a73; border-radius: 7px; color: var(--accent-brand); background: var(--panel-2); }
  .dlbtn:hover { background: var(--panel); }
  .appbox { margin-top: 10px; padding: 10px 12px; border-radius: 9px; background: var(--panel-2); border: 1px solid var(--line); }
  .appbox.submitted { border-color: #234a39; }
  .appbox > div { margin-top: 7px; }
  .picker { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
  .pick { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); cursor: pointer; }
  .pick.on { border-color: #2c4a73; }
  .tailorck { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; color: var(--muted); }

  .histrow { cursor: pointer; transition: border-color .15s, transform .1s; }
  .histrow:hover { border-color: #2c4a73; transform: translateX(2px); }
  .act .metric { font-size: 11px; white-space: nowrap; }
  .block + .block { margin-top: 14px; }
  .block p { margin: 8px 0 0; }

  /* ── Integrations test rows + Analytics bars (Phase 5) ───────────── */
  .svc.intg { flex-wrap: wrap; }
  .tbtn { padding: 5px 12px; font-size: 12px; }
  .tres { flex-basis: 100%; font-size: 11.5px; margin-top: 4px; padding-left: 18px; }
  .tres.good { color: var(--pass); } .tres.bad { color: var(--warn); }
  .bars { display: flex; flex-direction: column; gap: 9px; }
  .bar { display: flex; align-items: center; gap: 10px; }
  .bar .blabel { width: 74px; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar .btrack { flex: 1; height: 12px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .bar .bfill { display: block; height: 100%; background: linear-gradient(90deg, #1d3a5f, var(--accent-brand)); }
  .bar .bval { width: 78px; text-align: right; font-size: 12px; }

  .setform label { display: block; margin-bottom: 14px; color: var(--muted); font-size: 11px; letter-spacing: .5px; }
  .setform input, .setform select { display: block; margin-top: 6px; width: 100%; max-width: 440px; }

  /* ── War-room (Resolve) — preserved from the original UI ─────────── */
  .lanes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .lane-chip {
    display: flex; align-items: center; gap: 8px; padding: 7px 12px;
    border: 1px solid var(--line); border-radius: 999px; background: var(--panel-2);
    font-size: 12px; letter-spacing: .5px; opacity: .55; transition: opacity .25s, transform .25s;
  }
  .lane-chip.active { opacity: 1; transform: translateY(-1px); }
  .lane-chip .swatch { width: 10px; height: 10px; border-radius: 3px; }

  .feed { display: flex; flex-direction: column; gap: 12px; }
  .card {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-left: 4px solid var(--accent, #2c3a52); border-radius: 12px; padding: 13px 15px;
    animation: slidein .35s ease both;
  }
  @keyframes slidein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .card .head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .who { font-weight: 700; letter-spacing: 1px; color: var(--accent); }
  .tag {
    font-size: 10.5px; letter-spacing: 1px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 6px; padding: 1px 7px; text-transform: uppercase;
  }
  .ment { font-size: 11px; color: var(--muted); }
  .seq { margin-left: auto; font-size: 11px; color: #50607d; }
  .text { margin: 9px 0 0; }
  .facts { margin: 10px 0 0; display: flex; flex-wrap: wrap; gap: 7px; }
  .pill { font-size: 11px; padding: 2px 9px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .pill.warn { color: #fcd34d; border-color: #5a4a1f; }
  .trace { margin: 10px 0 0; padding: 9px 12px; background: var(--panel-2); border-radius: 8px; }
  .trace .line { color: var(--muted); font-size: 12.5px; }
  .trace .line:before { content: "› "; color: #45577a; }
  .followups { margin: 8px 0 0; padding-left: 4px; }
  .followups .fu { color: var(--muted); font-size: 12.5px; }
  .followups .fu:before { content: "□ "; color: #45577a; }

  .badge { font-weight: 800; letter-spacing: 1.5px; font-size: 12px; padding: 3px 12px; border-radius: 7px; }
  .badge.reject { color: #fff; background: var(--reject); }
  .badge.pass { color: #07241a; background: var(--pass); }
  .card.reject { border-color: var(--reject); box-shadow: 0 0 0 1px rgba(251,93,93,.35), 0 0 26px -8px rgba(251,93,93,.7); animation: slidein .35s ease both, shake .5s .15s; }
  .card.pass { border-color: var(--pass); box-shadow: 0 0 0 1px rgba(52,211,153,.4), 0 0 30px -6px rgba(52,211,153,.7); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }

  .verdict { margin-top: 22px; border: 1px solid #234a39; border-radius: 14px; overflow: hidden; animation: slidein .4s ease both; }
  .verdict.unresolved { border-color: #5a2a2a; }
  .verdict .vhead { background: linear-gradient(180deg, #103024, #0c2119); padding: 12px 16px; font-weight: 700; letter-spacing: 1.5px; color: var(--pass); }
  .verdict.unresolved .vhead { background: #2a1414; color: var(--reject); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; background: var(--line); }
  .cell { background: var(--panel); padding: 13px 15px; }
  .cell .k { font-size: 11px; color: var(--muted); letter-spacing: .5px; }
  .cell .v { font-size: 18px; margin-top: 3px; overflow-wrap: anywhere; }
  .cell .v.big { color: var(--pass); font-weight: 700; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="/static/vendor/react.production.min.js"></script>
  <script src="/static/vendor/react-dom.production.min.js"></script>
  <script src="/static/vendor/htm.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
